    <script>
        // 全局变量
        let allAinews = [];
        let currentDate = null;
        let searchKeyword = '';
        let currentSort = 'time'; // 'time' 或 'importance'
        let currentCategoryFilter = ''; // 空字符串表示"全部"
        
        // 计算字符串相似度（简单的编辑距离算法）
        function calculateSimilarity(str1, str2) {
            if (!str1 || !str2) return 0;
            if (str1 === str2) return 1;
            
            const len1 = str1.length;
            const len2 = str2.length;
            if (len1 === 0 || len2 === 0) return 0;
            
            // 使用最长公共子序列（LCS）的简化版本
            const maxLen = Math.max(len1, len2);
            let matches = 0;
            const minLen = Math.min(len1, len2);
            
            // 简单的字符匹配
            for (let i = 0; i < minLen; i++) {
                if (str1[i] === str2[i]) {
                    matches++;
                }
            }
            
            // 也检查子串匹配
            let substringMatches = 0;
            const checkLen = Math.min(50, minLen);
            for (let i = 0; i <= len1 - checkLen; i++) {
                const substr = str1.substring(i, i + checkLen);
                if (str2.includes(substr)) {
                    substringMatches = Math.max(substringMatches, substr.length);
                }
            }
            
            // 综合相似度：字符匹配 + 子串匹配
            const charSimilarity = matches / maxLen;
            const substrSimilarity = substringMatches / maxLen;
            return Math.max(charSimilarity, substrSimilarity * 0.8);
        }
        
        // 获取今天的日期字符串
        function getTodayDateStr() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        
        // 格式化日期显示
        function formatDateDisplay(dateStr) {
            if (!dateStr) return '今天';
            const date = new Date(dateStr);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            
            if (dateStr === getTodayDateStr()) {
                return '今天';
            } else if (date.toDateString() === yesterday.toDateString()) {
                return '昨天';
            } else {
                return date.toLocaleDateString('zh-CN', { 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric',
                    weekday: 'long'
                });
            }
        }
        
        // 格式化时间显示
        function formatTimeDisplay(timeStr) {
            if (!timeStr) return '未知时间';
            // 如果已经是标准格式，直接返回
            if (timeStr.includes(' ') && timeStr.includes('-')) {
                return timeStr;
            }
            // 尝试解析时间戳
            const timestamp = parseInt(timeStr);
            if (!isNaN(timestamp) && timestamp > 0) {
                const date = new Date(timestamp > 1000000000000 ? timestamp : timestamp * 1000);
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const hour = String(date.getHours()).padStart(2, '0');
                const minute = String(date.getMinutes()).padStart(2, '0');
                const second = String(date.getSeconds()).padStart(2, '0');
                return `${year}-${month}-${day} ${hour}:${minute}:${second}`;
            }
            return timeStr;
        }

        // 排序函数
        function sortNews(news) {
            const sorted = [...news];
            
            if (currentSort === 'time') {
                // 按时间排序（最新在前）
                sorted.sort((a, b) => {
                    const timeA = new Date(a.time || a.push_time || 0);
                    const timeB = new Date(b.time || b.push_time || 0);
                    return timeB - timeA;
                });
            } else if (currentSort === 'importance') {
                // 按重要度排序（可以基于来源、标题关键词等）
                sorted.sort((a, b) => {
                    // 简单的重要度计算：可以根据来源、标题长度、关键词等
                    const importanceA = calculateImportance(a);
                    const importanceB = calculateImportance(b);
                    
                    // 如果重要度相同，按时间排序
                    if (importanceA === importanceB) {
                        const timeA = new Date(a.time || a.push_time || 0);
                        const timeB = new Date(b.time || b.push_time || 0);
                        return timeB - timeA;
                    }
                    
                    return importanceB - importanceA;
                });
            }
            
            return sorted;
        }

            } else if (tier2Sources.some(s => source.includes(s))) {

                        itemCategory = classifyAIArticle(item);
                    }
                    return itemCategory === currentCategoryFilter;
                });
                console.log('分类筛选后长度:', filteredNews.length);
            }
            
            // 搜索筛选
            if (searchKeyword) {
                filteredNews = filteredNews.filter(item => {
                    const title = (item.title || '').toLowerCase();
                    const source = (item.source || '').toLowerCase();
                    const content = (item.content || '').toLowerCase();
                    return title.includes(searchKeyword) || source.includes(searchKeyword) || content.includes(searchKeyword);
                });
                console.log('搜索筛选后长度:', filteredNews.length);
            }
            
            // 排序
            filteredNews = sortNews(filteredNews);
            
            // 更新计数
            const countElement = document.getElementById('news-count');
            if (countElement) {
                countElement.textContent = filteredNews.length;
                console.log('已更新计数:', filteredNews.length);
            } else {
                console.error('找不到 news-count 元素！');
            }
            
            // 更新最后更新时间
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('last-update').textContent = timeStr;
            
            // 渲染列表
            const newsList = document.getElementById('news-list');
            if (!newsList) {
                console.error('找不到 news-list 元素！');
                return;
            }
            
            console.log('准备渲染，过滤后新闻数:', filteredNews.length);
            
            if (filteredNews.length === 0) {
                console.log('显示空状态');
                const dateText = currentDate ? formatDateDisplay(currentDate) : '今天';
                const emptyText = searchKeyword 
                    ? `${dateText}没有找到包含"${searchKeyword}"的资讯`
                    : `${dateText}还没有AI资讯`;
                newsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🤖</div>
                        <div class="empty-state-text">暂无AI资讯</div>
                        <div style="color: var(--text-tertiary); font-size: 0.9rem;">${emptyText}</div>
                    </div>
                `;
            } else {
                console.log('开始渲染新闻列表，共', filteredNews.length, '条');
                newsList.innerHTML = filteredNews.map((item, index) => {
                    const title = item.title || '无标题';
                    const source = item.source || '未知来源';
                    const time = formatTimeDisplay(item.time || item.push_time || '');
                    const link = item.url || '#';
                    const category = item.category || '';
                    let content = item.content || '';
                    
                    // 前端再次清理：移除多余空格，确保内容干净
                    content = content.replace(/\s+/g, ' ').trim();
                    
                    // 如果内容以标题开头，移除重复的标题
                    const titleClean = title.replace(/[：:]\s*$/, '').trim();
                    if (content.toLowerCase().startsWith(titleClean.toLowerCase())) {
                        content = content.substring(titleClean.length).trim();
                        // 移除开头的冒号、破折号等
                        content = content.replace(/^[：:\-\s]+/, '');
                    }
                    
                    // 生成预览（智能截断，避免截断单词）
                    let contentPreview = '';
                    if (content.length > 150) {
                        const truncated = content.substring(0, 150);
                        // 尝试在最后一个空格处截断（避免截断单词）
                        const lastSpace = truncated.lastIndexOf(' ');
                        if (lastSpace > 100) {
                            contentPreview = truncated.substring(0, lastSpace) + '...';
                        } else {
                            contentPreview = truncated + '...';
                        }
                    } else {
                        contentPreview = content;
                    }
                    
                    return `
                        <div class="news-item" onclick="window.open('${link}', '_blank')">
                            <div class="news-header">
                                <div class="news-title">${title}</div>
                                <div class="news-meta">
                                    ${category ? `<span class="news-category">${category}</span>` : ''}
                                    <span class="news-source">${source}</span>
                                    <span class="news-time">${time}</span>
                                </div>
                            </div>
                            ${contentPreview ? `<div class="news-content">${contentPreview}</div>` : ''}
                        </div>
                    `;
                }).join('');
                console.log('新闻列表渲染完成，innerHTML 长度:', newsList.innerHTML.length);
            }
            console.log('=== renderNewsList() 执行完成 ===');
        }
        
        // 加载AI资讯
        function loadAinews() {
            const targetDate = currentDate || getTodayDateStr();
            const isToday = targetDate === getTodayDateStr();
            
            // 静态模式：从 JSON 文件读取数据
            const basePath = (function() {
                const p = window.location.pathname;
                if (p.includes('/ainews/')) return '/ainews';
                return '';
            })();
            
            // 构建静态 JSON URL
            let url = `${basePath}/api/ainews_${targetDate}.json?t=${Date.now()}`;
            console.log('Static JSON URL:', url);
            
            fetch(url, { cache: 'no-cache' })
            .then(response => {
                if (!response.ok) {
                    if (response.status === 404) {
                        return [];
                    }
                    throw new Error(`HTTP ${response.status}`);
                }
                return response.json();
            })
            
            .then(data => {
                console.log('=== API 数据接收成功 ===');
                console.log('API 返回数据:', data);
                console.log('数据类型:', typeof data);
                console.log('是否为数组:', Array.isArray(data));
                console.log('数据长度:', data ? (Array.isArray(data) ? data.length : Object.keys(data).length) : 0);
                
                // 检查是否有错误
                if (data && data.error) {
                    console.error('API 返回错误:', data.error);
                    throw new Error(data.error || '获取数据失败');
                }
                
                // 确保 data 是数组
                if (!Array.isArray(data)) {
                    console.error('API 返回的不是数组:', data);
                    if (data && typeof data === 'object') {
                        // 尝试提取数组
                        data = Object.values(data);
                    } else {
                        data = [];
                    }
                }
                
                // 去重逻辑：基于标题+来源+内容相似度
                const deduplicated = [];
                const seen = new Map(); // 使用 Map 存储已见过的新闻标识
                
                // 按时间排序（新的在前），这样去重时会保留最新的
                const sortedData = (data || []).sort((a, b) => {
                    const timeA = a.time || a.push_time || '';
                    const timeB = b.time || b.push_time || '';
                    return timeB.localeCompare(timeA);
                });
                
                for (const item of sortedData) {
                    const title = (item.title || '').trim();
                    const source = (item.source || '').trim();
                    const content = (item.content || '').trim();
                    
                    // 生成唯一标识：标题前50字符 + 来源
                    const titleKey = title.substring(0, 50).toLowerCase();
                    const key = `${source}|${titleKey}`;
                    
                    // 检查是否已存在
                    if (seen.has(key)) {
                        const existing = seen.get(key);
                        // 如果标题和来源相同，进一步比较内容
                        // 移除数字和特殊字符后比较内容核心部分
                        const normalizeContent = (text) => {
                            // 移除末尾的数字（如浏览量、点赞数等）
                            return text
                                .replace(/\d{1,3}(,\d{3})*(\.\d+)?\s*(yesterday|today|ago|views|likes|shares)?/gi, '')
                                .replace(/\s+/g, ' ')
                                .trim()
                                .toLowerCase();
                        };
                        
                        const contentA = normalizeContent(content.substring(0, 300));
                        const contentB = normalizeContent((existing.content || '').substring(0, 300));
                        
                        // 如果核心内容相似度超过85%，认为是重复
                        const similarity = calculateSimilarity(contentA, contentB);
                        if (similarity > 0.85) {
                            console.log(`跳过重复新闻: ${title.substring(0, 30)}... (相似度: ${(similarity * 100).toFixed(1)}%)`);
                            continue;
                        }
                    }
                    
                    // 添加到结果中
                    deduplicated.push(item);
                    seen.set(key, item);
                }
                
                allAinews = deduplicated;
                
                console.log(`=== 数据处理完成 ===`);
                console.log(`原始数据: ${sortedData.length} 条，去重后: ${allAinews.length} 条（日期: ${targetDate}）`);
                console.log(`allAinews 变量已更新，长度: ${allAinews.length}`);
                
                // 更新分类按钮
                updateCategoryButtons();
                
                if (allAinews.length > 0) {
                    console.log('第一条数据示例:', allAinews[0]);
                    console.log('数据字段检查:', {
                        source: allAinews[0].source,
                        title: allAinews[0].title,
                        time: allAinews[0].time,
                        hasContent: !!allAinews[0].content,
                        url: allAinews[0].url
                    });
                    console.log('准备调用 renderNewsList()...');
                } else {
                    console.warn('⚠️ 数据为空！API 返回了空数组');
                    console.log('原始数据:', data);
                    console.log('data 是否为数组:', Array.isArray(data));
                    console.log('data 类型:', typeof data);
                    
                    // 如果今天没有数据，尝试自动切换到最近有数据的日期
                    if (isToday) {
                        console.log('今天没有数据，尝试获取最近有数据的日期...');
                        fetch(`${basePath}/api/latest_date.json?t=${Date.now()}`)
                            .then(response => response.json())
                            .then(result => {
                                if (result.latest_date && result.latest_date !== targetDate) {
                                    console.log(`找到最近有数据的日期: ${result.latest_date}`);
                                    currentDate = result.latest_date;
                                    const datePicker = document.getElementById('date-picker');
                                    if (datePicker) {
                                        datePicker.value = result.latest_date;
                                    }
                                    updateDateInfo();
                                    loadAinews(); // 重新加载数据
                                    return; // 不继续执行下面的代码
                                } else {
                                    // 没有找到其他日期，显示空状态
                                    console.log('没有找到其他有数据的日期，显示空状态');
                                    renderNewsList();
                                    updateDateInfo();
                                }
                            })
                            .catch(err => {
                                console.warn('获取最近日期失败:', err);
                                // 出错时也显示空状态
                                renderNewsList();
                                updateDateInfo();
                            });
                        return; // 等待异步操作完成，不立即执行下面的代码
                    }
                }
                
                console.log('调用 renderNewsList()...');
                renderNewsList();
                console.log('renderNewsList() 调用完成');
                updateDateInfo();
            })
            .catch(error => {
                console.error('加载AI资讯失败:', error);
                const emptyText = isToday 
                    ? '今天还没有AI资讯'
                    : `${formatDateDisplay(targetDate)}没有AI资讯数据`;
                document.getElementById('news-list').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🤖</div>
                        <div class="empty-state-text">${isToday ? '暂无AI资讯' : '无数据'}</div>
                        <div style="color: var(--text-tertiary); font-size: 0.9rem;">${emptyText}</div>
                    </div>
                `;
            });
        }
        
        // 刷新资讯
        async function refreshNews() {
            const refreshBtn = document.getElementById('refresh-btn-bottom');
            if (refreshBtn) {
                if (refreshBtn.classList.contains('refreshing')) {
                    return;
                }
                refreshBtn.classList.add('refreshing');
            }
            
            try {
                loadAinews();
            } catch (error) {
                console.error('刷新失败:', error);
            } finally {
                if (refreshBtn) {
                    setTimeout(() => {
                        refreshBtn.classList.remove('refreshing');
                    }, 500);
                }
            }
        }
        
        // 切换主题
        function toggleTheme() {
            const currentTheme = document.body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeButton(newTheme);
        }
        
        // 更新主题按钮
        function updateThemeButton(theme) {
            const btn = document.querySelector('.theme-toggle');
            if (btn) {
                btn.textContent = theme === 'dark' ? '☀️ 明亮' : '🌙 暗黑';
            }
        }
        
        // 滚动到顶部
        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }
        
        // 监听滚动
        function handleScroll() {
            const backToTopBtn = document.getElementById('back-to-top');
            if (backToTopBtn) {
                if (window.scrollY > 300) {
                    backToTopBtn.classList.add('show');
                } else {
                    backToTopBtn.classList.remove('show');
                }
            }
        }
        
        function init() {
            // 加载保存的主题
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.body.setAttribute('data-theme', savedTheme);
            updateThemeButton(savedTheme);
            
            // 初始化日期选择器
            initDatePicker();
            
            // 加载资讯
            loadAinews();
            
            // 静态模式：不自动刷新
            setInterval(() => {
                if (!currentDate || currentDate === getTodayDateStr()) {
                    loadAinews();
                }
            }, 30000);
            
            // 监听滚动事件
            window.addEventListener('scroll', handleScroll);
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
