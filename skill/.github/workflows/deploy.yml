name: Build & Deploy

on:
  schedule:
    - cron: '0 2,6,10,14,18,22 * * *'   # 每4小时执行（一天6次）
  workflow_dispatch:         # 手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout skill (this repo)
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: |
          go mod tidy
          go build -o skill .

      - name: Run search & generate static site
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          ./skill -once -static -base-url "/skill"

      - name: Checkout AINav (public repo)
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.AINAV_REPO }}
          token: ${{ secrets.AINAV_PAT }}
          path: ainav

      - name: Deploy to AINav/skill/
        run: |
          # 清空旧文件
          rm -rf ainav/skill/
          mkdir -p ainav/skill/
          
          # 复制新生成的静态文件
          cp -r docs/* ainav/skill/
          
          # 提交推送
          cd ainav
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skill/
          git diff --cached --quiet || git commit -m "auto: update skill static site $(date +%Y-%m-%d)"
          git push
