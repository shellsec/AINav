# Skill Monitor Configuration
# Monitor trending AI projects on GitHub

# GitHub API
github:
  token: ""
  maxResults: 30
  requestInterval: 3

# Monitor config
monitor:
  # Keyword monitoring — add/remove freely, tabs auto-generate
  keywords:
    # === AI Agent (hottest: OpenClaw, Hermes Agent) ===
    - query: "AI agent framework OpenClaw Hermes"
      label: "AI Agent"
      enabled: true
      regex: ""

    - query: "LLM tool calling function"
      label: "LLM Tools"
      enabled: true
      regex: ""

    - query: "RAG framework retrieval augmented"
      label: "RAG"
      enabled: true
      regex: ""

    - query: "AI coding assistant copilot Claude Code"
      label: "AI Coding"
      enabled: true
      regex: ""

    - query: "AI workflow automation orchestration Dify"
      label: "AI Workflow"
      enabled: true
      regex: ""

    # === Model & Inference ===
    - query: "AI model inference serving deploy vLLM Ollama"
      label: "Model Inference"
      enabled: true
      regex: ""

    - query: "LLM fine-tuning training framework Unsloth"
      label: "Fine-tuning"
      enabled: true
      regex: ""

    - query: "AI model evaluation benchmark"
      label: "AI Eval"
      enabled: true
      regex: ""

    # === AIGC & Multimodal ===
    - query: "AI image video generation AIGC ComfyUI"
      label: "AIGC"
      enabled: true
      regex: ""

    - query: "multimodal model vision language"
      label: "Multimodal"
      enabled: true
      regex: ""

    - query: "AI speech TTS voice agent GPT-SoVITS"
      label: "AI Speech"
      enabled: true
      regex: ""

    # === Data & Infra ===
    - query: "vector database embedding search Chroma"
      label: "Vector DB"
      enabled: true
      regex: ""

    - query: "AI memory context management Mem0"
      label: "AI Memory"
      enabled: true
      regex: ""

    - query: "AI search engine Perplexity"
      label: "AI Search"
      enabled: true
      regex: ""

    # === Safety & Robotics ===
    - query: "AI safety alignment RLHF"
      label: "AI Safety"
      enabled: true
      regex: ""

    - query: "embodied AI robotics manipulation"
      label: "Embodied AI"
      enabled: true
      regex: ""

  # Skill monitoring
  skills:
    - name: "Claude"
      query: "Claude Anthropic model AI agent"
      filterKeywords: ["claude", "anthropic", "model", "agent"]
      enabled: true
      label: "Claude"

    - name: "MCP Server"
      query: "MCP server model context protocol skill"
      filterKeywords: ["mcp", "server", "protocol", "skill"]
      enabled: true
      label: "MCP-Server"

    - name: "Claude Code Skill"
      query: "Claude Code skill agent plugin"
      filterKeywords: ["claude", "skill", "code"]
      enabled: true
      label: "Claude-Skill"

    - name: "LangChain Tool"
      query: "langchain tool agent"
      filterKeywords: ["langchain", "tool", "agent"]
      enabled: true
      label: "LangChain"

    - name: "Hermes Agent"
      query: "Hermes agent NousResearch self-improving"
      filterKeywords: ["hermes", "agent", "nous"]
      enabled: true
      label: "Hermes"

    - name: "Qwen"
      query: "Qwen model LLM Alibaba"
      filterKeywords: ["qwen", "llm", "model"]
      enabled: true
      label: "Qwen"

    - name: "DeepSeek"
      query: "DeepSeek model LLM inference"
      filterKeywords: ["deepseek", "llm", "model", "inference"]
      enabled: true
      label: "DeepSeek"

    - name: "Llama"
      query: "Llama model Meta LLM"
      filterKeywords: ["llama", "llm", "model"]
      enabled: true
      label: "Llama"

    - name: "GLM"
      query: "GLM model ChatGLM Zhipu LLM"
      filterKeywords: ["glm", "chatglm", "zhipu", "llm", "model"]
      enabled: true
      label: "GLM"

    - name: "Mistral"
      query: "Mistral Mixtral model LLM"
      filterKeywords: ["mistral", "mixtral", "llm", "model"]
      enabled: true
      label: "Mistral"

    - name: "Gemma"
      query: "Gemma model Google LLM"
      filterKeywords: ["gemma", "google", "llm", "model"]
      enabled: true
      label: "Gemma"

    - name: "Phi"
      query: "Phi model Microsoft small LLM"
      filterKeywords: ["phi", "microsoft", "llm", "model"]
      enabled: true
      label: "Phi"

    - name: "Kimi"
      query: "Kimi Moonshot model LLM"
      filterKeywords: ["kimi", "moonshot", "llm", "model"]
      enabled: true
      label: "Kimi"

    - name: "MiniMax"
      query: "MiniMax model LLM"
      filterKeywords: ["minimax", "llm", "model"]
      enabled: true
      label: "MiniMax"

  enableRelatedQuery: false
  blacklistUsers: []
  blacklistRepos: []
  minStars: 0
  recentDays: 0

# Push config
notifies:
  - type: bark
    enabled: false
    labels: []
    bark:
      serverUrl: "https://api.day.app"
      token: "YOUR_BARK_TOKEN"

  - type: telegram
    enabled: false
    labels: []
    telegram:
      botToken: "YOUR_BOT_TOKEN"
      chatId: "YOUR_CHAT_ID"

  - type: feishu
    enabled: false
    labels: []
    feishu:
      webhookUrl: ""
      secret: ""

  - type: dingtalk
    enabled: false
    labels: []
    dingtalk:
      webhookUrl: ""
      secret: ""

  - type: discord
    enabled: false
    labels: []
    discord:
      webhookUrl: ""

  - type: webhook
    enabled: false
    labels: []
    webhook:
      url: ""
      method: "POST"
      headers:
        Content-Type: "application/json"
      bodyTemplate: '{"title":"{{.title}}","content":"{{.content}}","label":"{{.label}}","url":"{{.url}}"}'

# Store config
store:
  dataDir: "data"
  gitAutoCommit: false

# Site config (for GitHub Pages deployment)
site:
  title: "Skill Monitor"
  # Base URL for sub-directory deployment (e.g. "/skill-monitor" for https://username.github.io/skill-monitor)
  # Leave empty "" for root deployment (e.g. https://username.github.io/)
  baseUrl: "/skill"
  # Output directory for static site (default: "docs")
  outputDir: "docs"
